<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ChemMon Wiki</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
<style>
  :root {
    --bg: #fafafa;
    --sidebar-bg: #fff;
    --sidebar-border: #e2e2e2;
    --text: #1a1a1a;
    --text-muted: #666;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --code-bg: #f1f5f9;
    --code-border: #e2e8f0;
    --table-border: #d1d5db;
    --table-stripe: #f9fafb;
    --badge-bg: #e0e7ff;
    --badge-text: #3730a3;
    --meta-bg: #f8fafc;
    --meta-border: #e2e8f0;
    --radius: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  aside {
    width: 280px;
    min-width: 280px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--sidebar-border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--sidebar-border);
  }

  .sidebar-header h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .sidebar-header p {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .nav-section {
    padding: 12px 16px 4px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
  }

  nav {
    flex: 1;
    overflow-y: auto;
    padding-bottom: 20px;
  }

  nav a {
    display: block;
    padding: 6px 16px;
    font-size: 13px;
    color: var(--text);
    text-decoration: none;
    border-left: 3px solid transparent;
    transition: all 0.15s;
  }

  nav a:hover { background: var(--table-stripe); }
  nav a.active {
    background: var(--badge-bg);
    color: var(--accent);
    border-left-color: var(--accent);
    font-weight: 500;
  }

  main {
    flex: 1;
    overflow-y: auto;
    padding: 32px 48px;
    max-width: 900px;
  }

  .meta-bar {
    background: var(--meta-bg);
    border: 1px solid var(--meta-border);
    border-radius: var(--radius);
    padding: 12px 16px;
    margin-bottom: 24px;
    font-size: 13px;
    color: var(--text-muted);
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
  }

  .meta-bar .label { font-weight: 600; color: var(--text); }

  .related-links { display: flex; flex-wrap: wrap; gap: 6px; }

  .related-link {
    display: inline-block;
    padding: 2px 8px;
    background: var(--badge-bg);
    color: var(--badge-text);
    border-radius: 4px;
    font-size: 12px;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.15s;
  }

  .related-link:hover { background: #c7d2fe; }

  .content h1 { font-size: 28px; font-weight: 700; margin-bottom: 16px; letter-spacing: -0.02em; }
  .content h2 { font-size: 20px; font-weight: 600; margin: 28px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--sidebar-border); }
  .content h3 { font-size: 16px; font-weight: 600; margin: 20px 0 8px; }
  .content p { line-height: 1.7; margin-bottom: 12px; }
  .content ul, .content ol { margin: 8px 0 16px 20px; line-height: 1.7; }
  .content li { margin-bottom: 6px; }
  .content li ul { margin-top: 4px; margin-bottom: 4px; }

  .content code {
    background: var(--code-bg);
    border: 1px solid var(--code-border);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 13px;
    font-family: "SF Mono", "Fira Code", "Consolas", monospace;
  }

  .content pre {
    background: var(--code-bg);
    border: 1px solid var(--code-border);
    border-radius: var(--radius);
    padding: 14px 16px;
    overflow-x: auto;
    margin: 12px 0 16px;
  }

  .content pre code {
    border: none;
    padding: 0;
    background: none;
    font-size: 13px;
  }

  .content table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0 20px;
    font-size: 14px;
  }

  .content th, .content td {
    border: 1px solid var(--table-border);
    padding: 8px 12px;
    text-align: left;
  }

  .content th {
    background: var(--table-stripe);
    font-weight: 600;
  }

  .content tr:nth-child(even) { background: var(--table-stripe); }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--text-muted);
    font-size: 14px;
  }

  @media (max-width: 768px) {
    aside { width: 220px; min-width: 220px; }
    main { padding: 20px 24px; }
  }
</style>
</head>
<body>

<aside>
  <div class="sidebar-header">
    <h1>ChemMon Wiki</h1>
    <p>Knowledge base viewer</p>
  </div>
  <nav id="nav"></nav>
</aside>

<main>
  <div id="meta" class="meta-bar" style="display:none"></div>
  <div id="content" class="content">
    <div class="loading">Loading wiki&hellip;</div>
  </div>
</main>

<script>
const sections = {
  "Orientation": ["index.md", "README.md", "PROJECT_CONTEXT.md", "log.md"],
  "Guidance": [],
  "Validation": [],
  "Reference": []
};

let pageCache = {};
let pageTitles = {};

function sanitize(html) {
  return DOMPurify.sanitize(html, { ADD_ATTR: ['onclick'] });
}

async function init() {
  try {
    const res = await fetch("/wiki/pages");
    const data = await res.json();
    for (const p of data.pages) {
      pageTitles[p.page_name] = p.title;
    }
    pageTitles["index.md"] = "Wiki Index";
    pageTitles["log.md"] = "Wiki Log";
  } catch(e) {
    console.warn("Could not fetch page list", e);
  }
  buildNav();
  const hash = location.hash.replace("#", "");
  loadPage(hash || "index.md");
}

function buildNav() {
  const nav = document.getElementById("nav");
  while (nav.firstChild) nav.removeChild(nav.firstChild);
  for (const [section, pages] of Object.entries(sections)) {
    const header = document.createElement("div");
    header.className = "nav-section";
    header.textContent = section;
    nav.appendChild(header);
    for (const page of pages) {
      const a = document.createElement("a");
      a.href = "#" + page;
      a.textContent = pageTitles[page] || page.replace(".md", "").replace(/-/g, " ");
      a.dataset.page = page;
      a.addEventListener("click", function(e) {
        e.preventDefault();
        loadPage(this.dataset.page);
      });
      nav.appendChild(a);
    }
  }
}

async function loadPage(pageName) {
  location.hash = pageName;
  document.querySelectorAll("nav a").forEach(function(a) {
    a.classList.toggle("active", a.dataset.page === pageName);
  });

  const contentEl = document.getElementById("content");
  const metaEl = document.getElementById("meta");

  if (pageCache[pageName]) {
    renderPage(pageCache[pageName]);
    return;
  }

  contentEl.textContent = "";
  const loadingDiv = document.createElement("div");
  loadingDiv.className = "loading";
  loadingDiv.textContent = "Loading\u2026";
  contentEl.appendChild(loadingDiv);
  metaEl.style.display = "none";

  try {
    const res = await fetch("/wiki/pages/" + encodeURIComponent(pageName));
    if (!res.ok) throw new Error(res.statusText);
    const data = await res.json();
    pageCache[pageName] = data;
    renderPage(data);
  } catch(e) {
    contentEl.textContent = "Failed to load " + pageName + ": " + e.message;
  }
}

function renderPage(data) {
  const contentEl = document.getElementById("content");
  const metaEl = document.getElementById("meta");

  let md = data.content || "";
  // strip YAML frontmatter
  if (md.startsWith("---")) {
    const end = md.indexOf("---", 3);
    if (end > 0) md = md.substring(end + 3).trim();
  }
  // strip HTML comments
  md = md.replace(/<!--[\s\S]*?-->/g, "");

  // NOTE: Content is sanitized via DOMPurify before DOM insertion
  const rendered = sanitize(marked.parse(md));
  contentEl.textContent = "";
  const wrapper = document.createElement("div");
  wrapper.innerHTML = rendered;
  contentEl.appendChild(wrapper);

  // make wiki links clickable
  contentEl.querySelectorAll("a").forEach(function(a) {
    const href = a.getAttribute("href") || "";
    if (href.startsWith("raw/chemmon-guidance/") || href.endsWith(".md")) {
      const target = href.split("/").pop();
      a.href = "#" + target;
      a.addEventListener("click", function(e) {
        e.preventDefault();
        loadPage(target);
      });
    }
  });

  // build meta bar
  const hasSources = data.sources && data.sources.length > 0;
  const hasRelated = data.related && data.related.length > 0;

  if (hasSources || hasRelated) {
    while (metaEl.firstChild) metaEl.removeChild(metaEl.firstChild);

    if (hasSources) {
      const srcDiv = document.createElement("div");
      const srcLabel = document.createElement("span");
      srcLabel.className = "label";
      srcLabel.textContent = "Sources: ";
      srcDiv.appendChild(srcLabel);
      srcDiv.appendChild(document.createTextNode(data.sources.join("; ")));
      metaEl.appendChild(srcDiv);
    }

    if (hasRelated) {
      const relDiv = document.createElement("div");
      const relLabel = document.createElement("span");
      relLabel.className = "label";
      relLabel.textContent = "Related: ";
      relDiv.appendChild(relLabel);

      const linksDiv = document.createElement("div");
      linksDiv.className = "related-links";
      data.related.forEach(function(r) {
        const name = r.replace(/\[\[|\]\]/g, "") + ".md";
        const title = pageTitles[name] || name.replace(".md", "").replace(/-/g, " ");
        const span = document.createElement("span");
        span.className = "related-link";
        span.textContent = title;
        span.addEventListener("click", function() { loadPage(name); });
        linksDiv.appendChild(span);
      });
      relDiv.appendChild(linksDiv);
      metaEl.appendChild(relDiv);
    }

    metaEl.style.display = "flex";
  } else {
    metaEl.style.display = "none";
  }

  document.querySelector("main").scrollTop = 0;
}

window.addEventListener("hashchange", function() {
  const page = location.hash.replace("#", "");
  if (page) loadPage(page);
});

init();
</script>
</body>
</html>
